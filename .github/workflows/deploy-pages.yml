name: Deploy to GitHub Pages

# Builds Vite and pushes ./dist into ./docs on main (JamesIves).
# In Settings → Pages: Source "Deploy from branch", Branch main, Folder /docs (not /root).
# Pushes that only touch docs/ are ignored to avoid deploy loops.

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          VITE_STRIPE_PAYMENT_LINK: ${{ secrets.VITE_STRIPE_PAYMENT_LINK }}
      - name: Verify production bundle
        run: |
          grep -q 'src="/assets/' dist/index.html || (echo "dist/index.html must reference hashed /assets/ bundles" && exit 1)
      - name: Deploy dist to docs/ on main
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: main
          folder: dist
          target-folder: docs
          clean: true
