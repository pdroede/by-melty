name: Deploy to GitHub Pages

# Builds the Vite app and pushes only ./dist to the gh-pages branch.
# In repo Settings → Pages, set Source to "Deploy from branch", Branch: gh-pages, Folder: / (root).
# Do NOT use main/(root) — that serves source index.html with /src/main.tsx (blank page).

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          VITE_STRIPE_PAYMENT_LINK: ${{ secrets.VITE_STRIPE_PAYMENT_LINK }}
      - name: Verify production bundle
        run: |
          grep -q 'src="/assets/' dist/index.html || (echo "dist/index.html must reference hashed /assets/ bundles" && exit 1)
      - name: Deploy dist to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
